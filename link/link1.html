<!DOCTYPE html>
<html>
<head>
    <title>Tentang Kami</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
        }

        /* HEADER */
        .header {
            background: #333;
            padding: 10px;
            text-align: left;
        }

        .back-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: white;
            color: #333;
            cursor: pointer;
        }

        .back-btn:hover {
            background: #ddd;
        }

        /* KONTEN */
        .container {
            margin-top: 50px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            margin: auto;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            color: #555;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <button class="back-btn" onclick="goHome()">⬅ Home</button>
</div>

<!-- KONTEN -->
<div class="container">
    <div class="card">
        <h2>📖 Tentang Kami</h2>
        <p>
            Kami adalah toko online terpercaya yang menyediakan berbagai produk berkualitas 
            dengan harga terjangkau. Kepuasan pelanggan adalah prioritas utama kami.
        </p>
    </div>
</div>

<script>
function goHome(){
    parent.frames["konten"].location.href = "../home.html";
}
</script>

</body>
</html>
