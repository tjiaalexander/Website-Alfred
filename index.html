<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Frame</title>
</head>

<!-- Frame utama -->
<frameset rows="*,60px" border="0">

    <!-- Frame kiri + konten -->
    <frameset cols="220px,*" border="1">
        <frame src="menu.html" name="menu">
        <frame src="home.html" name="konten">
    </frameset>

    <!-- Frame bawah -->
    <frame src="footer.html" name="footer">

</frameset>

</html>
