<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #17528a);
            color: white;
        }

        /* HEADER */
        .header {
            background:#333;
            padding: 15px 20px;
        }

        .back-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: white;
            color: #007bff;
            cursor: pointer;
            font-weight: bold;
        }

        .back-btn:hover {
            background: #ddd;
        }

        /* KONTEN */
        .container {
            text-align: center;
            margin-top: 100px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        .produk {
            background: #28a745;
            color: white;
        }

        .info {
            background: #ff9800;
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>
<body>

<!-- KONTEN -->
<div class="container">
    <h1>🛍️ Selamat Datang</h1>
    <p>Pilih menu di bawah untuk mulai</p>

    <button class="btn produk" onclick="goProduk()">📦 Produk</button>
    <button class="btn info" onclick="goInfo()">ℹ️ Info</button>
</div>

<script>
function goHome(){
    // reload ke home (aman untuk frame)
    parent.frames["konten"].location.href = "home.html";
}

function goProduk(){
    parent.frames["konten"].location.href = "produk/produk1.html";
}

function goInfo(){
    parent.frames["konten"].location.href = "link/link1.html";
}
</script>

</body>
</html>
